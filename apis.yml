        url: https://www.lucera.com
  - name: Capitalab
    description: |
      Capitalab is BGC's post-trade compression, optimization and risk-mitigation arm. It executes initial
      margin optimization runs across interest rate, FX, inflation and credit derivatives portfolios for
      banks and dealers, integrating with central counterparty clearing houses and bilateral OTC books.
      Programmatic engagement is operated through Capitalab's bespoke onboarding rather than a public API.
    humanURL: https://www.capitalab.com
    baseURL: https://www.capitalab.com
    aid: bgc-partners:capitalab
    tags:
      - Post-Trade
