  - name: Lucera LumeMarkets
    description: |
      Lucera is BGC's financial technology subsidiary offering a "high-performance, low latency platform that
      provides a single API for aggregating and trading across multiple markets – FX, Rates, Futures, Crypto,
      and Credit." Product portfolio: Connect (SDN connectivity), Compute (on-demand infrastructure),
      LumeMarkets (cross-asset trading platform), and LumeFX (FX-focused offering). The single-API
      cross-asset trading surface is the most explicit programmatic API in the BGC family.
    humanURL: https://www.lucera.com
    baseURL: https://www.lucera.com
    aid: bgc-partners:lucera
