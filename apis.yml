name: BGC Group
description: |
  BGC Group, Inc. (NASDAQ: BGC), formerly BGC Partners, is a global brokerage and financial technology firm.
  Headquartered in New York and London, BGC operates electronic and voice broking across foreign exchange,
  interest rate derivatives, fixed income, energy and commodities, equity derivatives, credit, and futures.
  Its technology portfolio includes the FMX division (FMX UST, FMX FX, and FMX Futures Exchange — launched
  September 23, 2024 for SOFR futures), Fenics Market Data (the exclusive data distributor for BGC and its
  affiliates), Capitalab (post-trade optimization), Lucera (LumeMarkets cross-asset trading platform and
  Lucera Connect/Compute infrastructure), and GFI Group. BGC spun off Newmark Group (NASDAQ: NMRK) on
  November 30, 2018. Public developer documentation is generally gated behind sales engagement; protocol
  specifications (FIX, ITCH/SoupBinTCP, BIMP, BOP) exist for institutional clients.
