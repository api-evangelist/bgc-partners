        url: https://www.capitalab.com
  - name: GFI Group
    description: |
      GFI Group, Inc. is a wholly owned BGC subsidiary — "a leading intermediary and provider of trading
      technologies and support services to the global OTC and listed markets." GFI offers voice and
      electronic brokerage in fixed income, FX, energy, credit and equity derivatives, along with software
      such as Trayport (now divested) historically and Fenics-branded data and analytics today.
    humanURL: https://www.gfigroup.com
    baseURL: https://www.gfigroup.com
    aid: bgc-partners:gfi-group
