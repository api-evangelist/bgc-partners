apis:
  - name: FMX Futures Exchange Connectivity
    description: |
      FMX Futures Exchange launched September 23, 2024, initially listing SOFR futures (the largest notional
      futures contract in the world) and adding U.S. Treasury futures in Q1 2025. Equity partners include
      Bank of America, Barclays, Citadel Securities, Citi, Goldman Sachs, J.P. Morgan, Jump Trading Group,
      Morgan Stanley, Tower Research Capital, and Wells Fargo. The exchange clears through LCH Limited. The
      platform represents "over $200 million of technological investment." Native connectivity is provided to
      institutional members via FIX protocol and proprietary binary feeds; specifications are distributed to
      onboarded participants.
    humanURL: https://www.fmxfutures.com
    baseURL: https://www.fmxfutures.com
    image: https://www.fmxfutures.com/favicon.ico
    aid: bgc-partners:fmx-futures
    tags:
      - Futures Exchange
      - SOFR
      - US Treasuries
      - FIX Protocol
      - Market Data
      - Derivatives
    properties:
      - type: Portal
        url: https://www.fmxfutures.com
      - type: Documentation
        url: https://www.fmx.com/wp-content/uploads/2024/06/FMX-Futures-Exchange-Overview-June-2024-1.pdf
      - type: PressRelease
        url: https://www.prnewswire.com/news-releases/bgc-group-launches-fmx-futures-exchange-302256660.html
  - name: FMX UST
    description: |
      FMX UST (formerly Fenics UST) is BGC's electronic trading venue for U.S. Treasuries. Connectivity is a
      "point-to-point service based on industry standards TCP/IP and the FIX Protocol." Supports FIX 4.4 with
      selected FIX 5.0 tags; proprietary BOP (Binary Order Protocol) over TCP for order entry; BIMP (Binary
      Market Data Protocol) over multicast for market data; Drop Copy and STP services. Order book depth of
      10 price levels in increments of 1/16 of a 32nd.
    humanURL: https://www.fenicsust.com
    baseURL: https://www.fenicsust.com
    aid: bgc-partners:fmx-ust
    tags:
      - US Treasuries
      - Electronic Trading
      - FIX Protocol
      - Binary Protocol
      - Market Data
      - Central Limit Order Book
    properties:
      - type: Portal
        url: https://www.fenicsust.com
      - type: Documentation
        url: https://www.fenicsust.com/technology/
  - name: FMX FX (Fenics FX)
    description: |
      FMX FX (operating as Fenics FX) is BGC's electronic foreign exchange platform covering Spot, Forwards,
      NDFs and Options. Integration is offered via FIX (order entry) and ITCH/OUCH (market data and order
      entry) protocols. The Fenics FX ITCH market data service uses SoupBinTCP on top of TCP for session
      control and delivers tick-by-tick quote updates over a single TCP/IP connection.
    humanURL: https://www.fenicsfx.com
    baseURL: https://www.fenicsfx.com
    aid: bgc-partners:fmx-fx
    tags:
      - Foreign Exchange
      - FX Spot
      - FX Forwards
      - NDF
      - FX Options
      - FIX Protocol
      - ITCH
      - OUCH
      - SoupBinTCP
      - Market Data
