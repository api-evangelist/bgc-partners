      - type: Specification
        url: https://www.fenicsfx.com/wp-content/uploads/2019/09/FenicsFX_ITCH_MarketData_v7.pdf
  - name: Fenics Market Data
    description: |
      Fenics Market Data (FMD) is the exclusive data distributor of BGC Group, Inc. and its affiliates. FMD
      provides streaming, intra-day, end-of-day and historical market data across Foreign Exchange (350+
      currency pairs with history from 2005), Interest Rate Derivatives (30+ currencies, 290+ curves), Fixed
      Income (US Treasuries, global government bonds, corporate bonds, CDS), Inflation Derivatives, Energy &
      Commodities, and Equity Derivatives. Delivery formats include Pricing/Modelled curves and surfaces and
      Orderbook/Level 2 consolidated quotes. Distribution channels include "API, Desktop, Excel, Cloud, FTP,
      SFTP, and Deployed/Onsite Servers" with FIX/API and binary protocols for low-latency feeds.
    humanURL: https://www.fenicsmd.com
    baseURL: https://www.fenicsmd.com
